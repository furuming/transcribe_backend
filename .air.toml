# .air.toml

root = "."
tmp_dir = "tmp"

[build]
# ビルドコマンド
cmd = "go build -o ./tmp/api ./cmd/api"

# 実行バイナリ
bin = "tmp/api"

# 監視対象
include_ext = ["go", "tpl", "tmpl", "html"]

# 監視除外
exclude_dir = [
  "tmp",
  "vendor",
  "node_modules",
  "migrations",
  "gen"
]

exclude_file = []
exclude_regex = ["_test.go"]

# 再ビルド前のdelay
delay = 1000

# kill signal
kill_delay = "500ms"

# ビルドエラー時でも古いバイナリを走らせるか
stop_on_error = true

# ファイル変更検知
follow_symlink = false

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
